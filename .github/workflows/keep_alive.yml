name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sblnow.streamlit.app/_stcore/health)
          echo "Status: $STATUS"
